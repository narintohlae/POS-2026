<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus POS 2026 | Inventory Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Anuphan:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Anuphan', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00f2ff 0%, #006aff 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .loader {
            border-top-color: var(--accent);
            animation: spinner 0.6s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950">
        <div class="loader w-12 h-12 border-4 border-slate-700 rounded-full mb-4"></div>
        <p class="text-blue-400 font-medium tracking-widest animate-pulse">SYNCING DATA...</p>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <header class="lg:col-span-12 flex justify-between items-center mb-4">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300">
                    NEXUS POS <span class="text-xs font-light text-slate-500 align-top">v2026.1</span>
                </h1>
                <p id="status-text" class="text-xs text-slate-400 mt-1 italic">Initializing modules...</p>
            </div>
            <div class="flex gap-4">
                <button onclick="fetchData()" class="glass-panel px-4 py-2 text-sm hover:bg-white/5 transition">Refresh Sheet</button>
                <div class="glass-panel px-4 py-2 text-sm border-emerald-500/30 text-emerald-400">System Online</div>
            </div>
        </header>

        <div class="lg:col-span-8 space-y-6">
            
            <div class="grid grid-cols-3 gap-4">
                <div class="glass-panel p-4">
                    <p class="text-xs text-slate-400 uppercase tracking-wider">Total Items</p>
                    <p id="total-items" class="text-2xl font-bold">0</p>
                </div>
                <div class="glass-panel p-4">
                    <p class="text-xs text-slate-400 uppercase tracking-wider">Inventory Value</p>
                    <p id="total-value" class="text-2xl font-bold text-cyan-400">฿0.00</p>
                </div>
                <div class="glass-panel p-4 border-blue-500/20">
                    <p class="text-xs text-slate-400 uppercase tracking-wider">Session Sales</p>
                    <p id="session-sales" class="text-2xl font-bold">0</p>
                </div>
            </div>

            <div class="glass-panel overflow-hidden flex flex-col h-[600px]">
                <div class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
                    <h2 class="text-xl font-semibold">Inventory Catalogue</h2>
                    <div class="relative w-72">
                        <input type="text" id="searchInput" oninput="filterTable()" 
                               placeholder="Search name or scan barcode..." 
                               class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-2 focus:outline-none focus:border-cyan-500 transition text-sm">
                    </div>
                </div>
                
                <div class="overflow-y-auto custom-scrollbar flex-grow">
                    <table class="w-full text-left text-sm">
                        <thead class="sticky top-0 bg-slate-900 text-slate-400">
                            <tr>
                                <th class="p-4 font-medium">รหัสสินค้า</th>
                                <th class="p-4 font-medium">ชื่อสินค้า</th>
                                <th class="p-4 font-medium text-center">หน่วย</th>
                                <th class="p-4 font-medium text-right">ราคา</th>
                                <th class="p-4 font-medium text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="divide-y divide-white/5">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4">
            <div class="glass-panel sticky top-8 flex flex-col h-[calc(100vh-140px)] border-blue-500/20">
                <div class="p-6 border-b border-white/10">
                    <h2 class="text-xl font-semibold flex items-center gap-2">
                        Current Order
                        <span id="cart-count" class="bg-blue-600 text-[10px] px-2 py-0.5 rounded-full">0</span>
                    </h2>
                </div>

                <div id="cartItems" class="flex-grow overflow-y-auto p-6 space-y-4 custom-scrollbar">
                    <div id="empty-cart" class="text-center py-20 opacity-30">
                        <svg class="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                        <p>Cart is empty</p>
                    </div>
                </div>

                <div class="p-6 bg-white/5 rounded-b-3xl space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400">Subtotal</span>
                        <span id="cart-subtotal">฿0.00</span>
                    </div>
                    <div class="flex justify-between items-center text-xl font-bold text-cyan-400">
                        <span>Total</span>
                        <span id="cart-total">฿0.00</span>
                    </div>
                    <button onclick="checkout()" class="btn-primary w-full py-4 rounded-2xl font-bold uppercase tracking-widest text-sm">
                        Process Transaction
                    </button>
                    <button onclick="clearCart()" class="w-full text-xs text-slate-500 hover:text-red-400 transition">
                        Clear Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaJT9WaWQ7-BDK5vkjQwrcZ9W86RATTgFsgH7dsAfhAOqbpA878B22qCbQVhQu24gZjQvw9MwDedQt/pub?output=csv';
        let inventory = [];
        let cart = [];
        let sessionSalesCount = 0;

        // --- Data Handling ---

        async function fetchData() {
            const statusText = document.getElementById('status-text');
            const loading = document.getElementById('loading');
            
            try {
                statusText.innerText = "Fetching latest inventory data...";
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                
                inventory = parseCSV(data);
                renderInventory(inventory);
                updateStats();
                
                setTimeout(() => {
                    loading.style.display = 'none';
                    statusText.innerText = `Connected. Last sync: ${new Date().toLocaleTimeString()}`;
                }, 800);
            } catch (error) {
                console.error('Fetch error:', error);
                statusText.innerText = "Error syncing data.";
                alert("Could not load data. Check console for details.");
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const results = [];

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const currentLine = lines[i].split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = currentLine[index]?.trim();
                });
                results.push(obj);
            }
            return results;
        }

        // --- UI Rendering ---

        function renderInventory(items) {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = items.map(item => `
                <tr class="hover:bg-white/5 transition-colors group">
                    <td class="p-4 text-slate-400 font-mono text-xs">${item.รหัสสินค้า}</td>
                    <td class="p-4">
                        <div class="font-semibold text-slate-200">${item.ชื่อการค้า}</div>
                        <div class="text-[10px] text-slate-500">${item.บาร์โค้ด}</div>
                    </td>
                    <td class="p-4 text-center text-xs text-slate-400">${item.หน่วย}</td>
                    <td class="p-4 text-right font-bold text-blue-300">฿${parseFloat(item.ราคา).toLocaleString()}</td>
                    <td class="p-4 text-center">
                        <button onclick="addToCart('${item.รหัสสินค้า}')" 
                                class="bg-blue-500/10 hover:bg-blue-500 text-blue-400 hover:text-white p-2 rounded-lg transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = inventory.filter(item => 
                item.ชื่อการค้า.toLowerCase().includes(query) || 
                item.บาร์โค้ด.includes(query) ||
                item.รหัสสินค้า.toLowerCase().includes(query)
            );
            renderInventory(filtered);
        }

        // --- Cart Logic ---

        function addToCart(productId) {
            const product = inventory.find(p => p.รหัสสินค้า === productId);
            const existing = cart.find(item => item.รหัสสินค้า === productId);

            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.รหัสสินค้า !== productId);
            renderCart();
        }

        function renderCart() {
            const cartContainer = document.getElementById('cartItems');
            const emptyCart = document.getElementById('empty-cart');
            
            if (cart.length === 0) {
                cartContainer.innerHTML = '';
                cartContainer.appendChild(emptyCart);
                updateCartTotals(0);
                return;
            }

            cartContainer.innerHTML = cart.map(item => `
                <div class="glass-panel bg-white/5 p-4 flex justify-between items-center animate-in fade-in slide-in-from-right-4 duration-300">
                    <div>
                        <div class="font-semibold text-sm">${item.ชื่อการค้า}</div>
                        <div class="text-xs text-slate-500">฿${item.ราคา} x ${item.qty}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold text-blue-400">฿${(item.ราคา * item.qty).toLocaleString()}</span>
                        <button onclick="removeFromCart('${item.รหัสสินค้า}')" class="text-slate-600 hover:text-red-400">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.ราคา * item.qty), 0);
            updateCartTotals(total);
        }

        function updateCartTotals(total) {
            document.getElementById('cart-subtotal').innerText = `฿${total.toLocaleString()}`;
            document.getElementById('cart-total').innerText = `฿${total.toLocaleString()}`;
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
        }

        function clearCart() {
            cart = [];
            renderCart();
        }

        function checkout() {
            if (cart.length === 0) return alert("Cart is empty");
            
            sessionSalesCount++;
            document.getElementById('session-sales').innerText = sessionSalesCount;
            
            const total = cart.reduce((sum, item) => sum + (item.ราคา * item.qty), 0);
            alert(`Transaction Successful!\nTotal: ฿${total.toLocaleString()}\nThank you!`);
            
            clearCart();
        }

        function updateStats() {
            document.getElementById('total-items').innerText = inventory.length;
            const totalVal = inventory.reduce((sum, item) => sum + (parseFloat(item.ต้นทุน || 0)), 0);
            document.getElementById('total-value').innerText = `฿${totalVal.toLocaleString()}`;
        }

        // Initialize
        fetchData();

    </script>
</body>
</html>
