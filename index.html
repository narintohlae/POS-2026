<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart POS 2026 | Custom Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Anuphan:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Anuphan', sans-serif; background: #f8fafc; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.4); }
        .product-card:active { transform: scale(0.95); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col p-4">

    <nav class="glass rounded-3xl p-4 mb-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-2xl text-white">
                <i data-lucide="shopping-bag"></i>
            </div>
            <div>
                <h1 class="font-bold text-gray-800 leading-none">ระบบขายหน้าร้าน</h1>
                <span class="text-[10px] text-blue-600 font-bold uppercase tracking-wider">Inventory Connected</span>
            </div>
        </div>
        <div class="flex-1 max-w-md mx-6">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="ชื่อสินค้า หรือ สแกนบาร์โค้ด..." 
                    class="w-full pl-10 pr-4 py-2 bg-gray-100/50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 transition-all outline-none">
            </div>
        </div>
        <button onclick="fetchData()" class="p-2 hover:bg-gray-100 rounded-full transition-all">
            <i data-lucide="refresh-cw" id="syncIcon" class="w-5 h-5 text-gray-600"></i>
        </button>
    </nav>

    <main class="flex flex-1 gap-4 overflow-hidden">
        <section class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
                </div>
        </section>

        <aside class="w-80 lg:w-96 glass rounded-[32px] flex flex-col shadow-xl overflow-hidden border-none">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h2 class="font-bold text-gray-700 flex items-center gap-2">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i> ตะกร้าสินค้า
                </h2>
                <span id="itemCount" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">0 รายการ</span>
            </div>

            <div id="cartList" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                </div>

            <div class="p-6 bg-white space-y-4">
                <div class="space-y-2">
                    <div class="flex justify-between text-gray-500 text-sm">
                        <span>ยอดรวม</span>
                        <span id="subtotal">฿0.00</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold text-gray-800">
                        <span>ทั้งสิ้น</span>
                        <span id="totalDisplay">฿0.00</span>
                    </div>
                </div>
                <button onclick="openPayment()" class="w-full py-4 bg-gray-900 hover:bg-black text-white rounded-2xl font-bold transition-all shadow-lg active:scale-95">
                    ชำระเงิน
                </button>
            </div>
        </aside>
    </main>

    <div id="payModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[32px] w-full max-w-md p-8 shadow-2xl">
            <div class="text-center mb-6">
                <p class="text-gray-500">ยอดชำระทั้งหมด</p>
                <h2 id="modalTotal" class="text-5xl font-black text-gray-900 mt-1">฿0.00</h2>
            </div>
            <div class="space-y-4">
                <input type="number" id="cashInput" placeholder="รับเงินมา (บาท)..." 
                    class="w-full text-3xl p-5 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-blue-500 outline-none text-center font-bold">
                <div class="flex justify-between text-2xl font-bold p-2">
                    <span class="text-gray-500">เงินทอน:</span>
                    <span id="changeDisplay" class="text-blue-600">฿0.00</span>
                </div>
                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button onclick="closePayment()" class="py-4 bg-gray-100 rounded-2xl font-bold text-gray-600">ยกเลิก</button>
                    <button onclick="confirmSale()" class="py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-blue-200 shadow-lg">ยืนยัน</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaJT9WaWQ7-BDK5vkjQwrcZ9W86RATTgFsgH7dsAfhAOqbpA878B22qCbQVhQu24gZjQvw9MwDedQt/pub?output=csv';
        
        let inventory = [];
        let cart = [];

        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            lucide.createIcons();
            
            document.getElementById('searchInput').addEventListener('input', (e) => renderProducts(e.target.value));
            document.getElementById('cashInput').addEventListener('input', calcChange);
        });

        async function fetchData() {
            const icon = document.getElementById('syncIcon');
            icon.classList.add('animate-spin');
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                inventory = parseThaiCSV(text);
                renderProducts();
            } catch (err) {
                alert('เกิดข้อผิดพลาดในการโหลดข้อมูลสินค้า');
            } finally {
                icon.classList.remove('animate-spin');
            }
        }

        function parseThaiCSV(csv) {
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            
            return lines.slice(1).filter(line => line.trim()).map(line => {
                const values = line.split(',');
                let data = {};
                headers.forEach((h, i) => data[h] = values[i]?.trim());
                
                return {
                    id: data['รหัสสินค้า'] || 'N/A',
                    name: data['ชื่อการค้า'] || 'ไม่ระบุชื่อ',
                    unit: data['หน่วย'] || 'ชิ้น',
                    barcode: data['บาร์โค้ด'] || '',
                    price: parseFloat(data['ราคา']) || 0,
                    cost: parseFloat(data['ต้นทุน']) || 0,
                    // สร้างภาพจำลองจากชื่อสินค้า
                    img: `https://ui-avatars.com/api/?name=${encodeURIComponent(data['ชื่อการค้า'])}&background=random&size=128`
                };
            });
        }

        function renderProducts(filter = '') {
            const grid = document.getElementById('productGrid');
            const filtered = inventory.filter(p => 
                p.name.toLowerCase().includes(filter.toLowerCase()) || 
                p.barcode.includes(filter) ||
                p.id.includes(filter)
            );

            grid.innerHTML = filtered.map(p => `
                <div onclick="addToCart('${p.id}')" class="product-card bg-white p-3 rounded-[24px] shadow-sm hover:shadow-md transition-all cursor-pointer border border-gray-50 group">
                    <div class="aspect-square rounded-2xl mb-3 overflow-hidden bg-gray-50">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform">
                    </div>
                    <h3 class="font-bold text-gray-800 text-sm truncate">${p.name}</h3>
                    <div class="flex justify-between items-end mt-2">
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">${p.unit}</p>
                            <p class="text-blue-600 font-bold">฿${p.price.toLocaleString()}</p>
                        </div>
                        <div class="bg-gray-100 p-1.5 rounded-lg text-gray-400 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addToCart(id) {
            const item = inventory.find(p => p.id === id);
            const inCart = cart.find(c => c.id === id);
            if (inCart) inCart.qty++;
            else cart.push({ ...item, qty: 1 });
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cartList');
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            document.getElementById('itemCount').innerText = `${cart.length} รายการ`;
            document.getElementById('subtotal').innerText = `฿${total.toLocaleString()}`;
            document.getElementById('totalDisplay').innerText = `฿${total.toLocaleString()}`;

            if (cart.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-gray-300 text-sm">ไม่มีสินค้า</div>';
                return;
            }

            list.innerHTML = cart.map(item => `
                <div class="flex items-center gap-3 bg-gray-50/50 p-3 rounded-2xl border border-gray-100">
                    <div class="flex-1">
                        <h4 class="text-xs font-bold text-gray-700 truncate w-32">${item.name}</h4>
                        <p class="text-[10px] text-blue-500 font-bold">฿${item.price} x ${item.qty}</p>
                    </div>
                    <div class="flex items-center gap-2 bg-white rounded-xl p-1 shadow-sm">
                        <button onclick="adjustQty('${item.id}', -1)" class="w-6 h-6 hover:bg-gray-100 rounded-lg text-xs">-</button>
                        <span class="text-xs font-bold w-4 text-center">${item.qty}</span>
                        <button onclick="adjustQty('${item.id}', 1)" class="w-6 h-6 hover:bg-gray-100 rounded-lg text-xs">+</button>
                    </div>
                </div>
            `).join('');
        }

        function adjustQty(id, delta) {
            const item = cart.find(c => c.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
            }
            updateCartUI();
        }

        function openPayment() {
            if (cart.length === 0) return;
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('modalTotal').innerText = `฿${total.toLocaleString()}`;
            document.getElementById('payModal').classList.remove('hidden');
            document.getElementById('cashInput').focus();
        }

        function calcChange() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const cash = parseFloat(document.getElementById('cashInput').value) || 0;
            const change = cash - total;
            document.getElementById('changeDisplay').innerText = `฿${(change > 0 ? change : 0).toLocaleString()}`;
        }

        function closePayment() {
            document.getElementById('payModal').classList.add('hidden');
            document.getElementById('cashInput').value = '';
        }

        function confirmSale() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const cash = parseFloat(document.getElementById('cashInput').value) || 0;
            if (cash < total) return alert('เงินรับมาไม่พอ');
            
            alert('ชำระเงินเรียบร้อย!');
            cart = [];
            updateCartUI();
            closePayment();
        }
    </script>
</body>
</html>
