<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Ultra POS | 50K Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap');
        body { font-family: 'Anuphan', sans-serif; background: #f1f5f9; height: 100vh; overflow: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid #ffffff; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        #scroll-container { scroll-behavior: smooth; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-20 bg-white border-b flex items-center px-6 gap-6 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold">N</div>
            <h1 class="text-xl font-bold hidden md:block">Nexus Ultra</h1>
        </div>
        
        <div class="flex-1 relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="search-input" oninput="handleSearch(this.value)" 
                placeholder="ค้นหาด่วนจาก 50,000 รายการ (รหัส, ชื่อ, บาร์โค้ด)..." 
                class="w-full pl-12 pr-4 py-3 rounded-2xl bg-slate-100 border-none focus:ring-2 ring-blue-500 outline-none text-lg">
        </div>

        <div class="flex items-center gap-4">
            <button onclick="fetchData()" class="p-3 text-slate-500 hover:bg-slate-100 rounded-xl transition-all">
                <i class="fas fa-sync-alt" id="sync-icon"></i>
            </button>
            <div id="status-badge" class="px-3 py-1 bg-green-100 text-green-600 rounded-full text-xs font-bold">
                Online
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="flex-1 flex flex-col p-6 overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <div class="text-slate-500 text-sm">
                    พบสินค้า <span id="count-display" class="font-bold text-blue-600">0</span> รายการ
                </div>
                <div class="flex gap-2">
                    <button onclick="switchTab('pos')" class="px-4 py-2 bg-white rounded-lg shadow-sm text-sm font-medium">ขาย</button>
                    <button onclick="switchTab('inventory')" class="px-4 py-2 bg-white rounded-lg shadow-sm text-sm font-medium">คลัง</button>
                </div>
            </div>

            <div id="scroll-container" class="flex-1 overflow-y-auto pr-2" onscroll="checkScroll(this)">
                <div id="product-list" class="product-grid">
                    </div>
                <div id="load-more-trigger" class="py-10 text-center text-slate-400 text-sm">
                    <i class="fas fa-circle-notch fa-spin mr-2"></i> กำลังโหลดเพิ่ม...
                </div>
            </div>
        </section>

        <aside class="w-96 bg-white border-l flex flex-col shadow-2xl z-10">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="font-bold text-lg">รายการชำระเงิน</h2>
                <button onclick="clearCart()" class="text-red-500 text-sm hover:underline">ล้างรถเข็น</button>
            </div>
            
            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div class="text-center py-20 text-slate-400">
                    <i class="fas fa-shopping-basket text-4xl mb-4 block opacity-20"></i>
                    รถเข็นว่างเปล่า
                </div>
            </div>

            <div class="p-6 bg-slate-50 space-y-4">
                <div class="flex justify-between text-slate-500">
                    <span>จำนวนรายการ</span>
                    <span id="cart-count">0</span>
                </div>
                <div class="flex justify-between text-2xl font-bold text-slate-800">
                    <span>ยอดรวม</span>
                    <span id="total-amount" class="text-blue-600">฿0.00</span>
                </div>
                <button onclick="processSale()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 transition-all transform active:scale-95">
                    ชำระเงิน (F10)
                </button>
            </div>
        </aside>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaJT9WaWQ7-BDK5vkjQwrcZ9W86RATTgFsgH7dsAfhAOqbpA878B22qCbQVhQu24gZjQvw9MwDedQt/pub?output=csv';
        
        let allItems = []; // 50,000 รายการหลัก
        let filteredItems = []; // รายการที่ผ่านการกรอง/ค้นหา
        let cart = [];
        let itemsToShow = 60; // จำนวนที่จะแสดงในตอนแรก
        let searchTimeout = null;

        // 1. Fetch Data with Speed Optimization
        async function fetchData() {
            const syncIcon = document.getElementById('sync-icon');
            syncIcon.classList.add('fa-spin');
            
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    worker: true, // ใช้ Worker เพื่อไม่ให้ UI ค้าง
                    complete: (results) => {
                        allItems = results.data
                            .filter(row => row['ชื่อการค้า']) // ตัดแถวว่าง
                            .map((item, idx) => ({
                                id: idx,
                                code: item['รหัสสินค้า'] || '',
                                name: item['ชื่อการค้า'],
                                unit: item['หน่วย'] || 'ชิ้น',
                                barcode: item['บาร์โค้ด'] || '',
                                price: parseFloat(String(item['ราคา']).replace(/,/g, '')) || 0,
                                cost: parseFloat(String(item['ต้นทุน']).replace(/,/g, '')) || 0
                            }));
                        
                        filteredItems = [...allItems];
                        resetView();
                        syncIcon.classList.remove('fa-spin');
                    }
                });
            } catch (error) {
                console.error(error);
                alert("โหลดข้อมูลไม่สำเร็จ!");
            }
        }

        // 2. High Speed Search (Debounced)
        function handleSearch(val) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = val.toLowerCase().trim();
                if (!query) {
                    filteredItems = [...allItems];
                } else {
                    filteredItems = allItems.filter(item => 
                        item.name.toLowerCase().includes(query) || 
                        item.barcode.includes(query) ||
                        item.code.toLowerCase().includes(query)
                    );
                }
                resetView();
            }, 300); // รอ 300ms เพื่อให้พิมพ์ลื่น
        }

        // 3. Lazy Loading Logic
        function resetView() {
            itemsToShow = 60;
            document.getElementById('scroll-container').scrollTop = 0;
            document.getElementById('count-display').innerText = filteredItems.length.toLocaleString();
            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('product-list');
            const chunk = filteredItems.slice(0, itemsToShow);
            
            container.innerHTML = chunk.map(item => `
                <div onclick="addToCart(${item.id})" class="glass-panel p-4 rounded-2xl cursor-pointer hover:border-blue-400 hover:shadow-md transition-all group">
                    <div class="text-[10px] text-slate-400 mb-1">${item.barcode || item.code}</div>
                    <div class="font-bold text-slate-800 text-sm h-10 line-clamp-2 group-hover:text-blue-600">${item.name}</div>
                    <div class="mt-3 flex justify-between items-center">
                        <span class="text-blue-600 font-bold">฿${item.price.toLocaleString()}</span>
                        <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-500">${item.unit}</span>
                    </div>
                </div>
            `).join('');

            // ซ่อนตัวโหลดถ้าหมดแล้ว
            document.getElementById('load-more-trigger').style.display = 
                itemsToShow >= filteredItems.length ? 'none' : 'block';
        }

        function checkScroll(el) {
            // ถ้าเลื่อนถึงเกือบด้านล่าง ให้โหลดเพิ่มอีก 40 รายการ
            if (el.scrollTop + el.clientHeight >= el.scrollHeight - 200) {
                if (itemsToShow < filteredItems.length) {
                    itemsToShow += 40;
                    renderGrid();
                }
            }
        }

        // 4. Cart Logic (Optimized)
        function addToCart(id) {
            const product = allItems.find(i => i.id === id);
            const existing = cart.find(c => c.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400"><i class="fas fa-shopping-basket text-4xl mb-4 block opacity-20"></i>รถเข็นว่างเปล่า</div>`;
                updateTotal();
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="flex items-center gap-3 bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-800 text-xs truncate w-40">${item.name}</h4>
                        <div class="text-blue-500 text-xs font-bold">฿${(item.price * item.qty).toLocaleString()}</div>
                    </div>
                    <div class="flex items-center bg-slate-50 rounded-lg p-1">
                        <button onclick="updateQty(${item.id}, -1)" class="w-6 h-6 hover:bg-white rounded">-</button>
                        <span class="w-8 text-center text-xs font-bold">${item.qty}</span>
                        <button onclick="updateQty(${item.id}, 1)" class="w-6 h-6 hover:bg-white rounded">+</button>
                    </div>
                </div>
            `).join('');
            updateTotal();
        }

        function updateQty(id, delta) {
            const item = cart.find(c => c.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
                renderCart();
            }
        }

        function updateTotal() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('total-amount').innerText = `฿${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('cart-count').innerText = cart.length;
        }

        function clearCart() {
            cart = [];
            renderCart();
        }

        function processSale() {
            if (cart.length === 0) return;
            alert(`ชำระเงินเรียบร้อย!\nยอดรวม: ${document.getElementById('total-amount').innerText}`);
            cart = [];
            renderCart();
        }

        // Init
        fetchData();

        // Keyboard Shortcut (F10 to pay)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'F10') {
                e.preventDefault();
                processSale();
            }
        });
    </script>
</body>
</html>
