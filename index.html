<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus POS | 2026 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #f8fafc, #e2e8f0);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .active-nav {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-7xl mx-auto flex flex-col md:flex-row gap-6">
        
        <nav class="w-full md:w-20 glass-card rounded-3xl p-4 flex md:flex-col items-center justify-between md:justify-start gap-8">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-xl font-bold">N</div>
            <div class="flex md:flex-col gap-6">
                <button onclick="switchTab('pos')" id="nav-pos" class="nav-btn active-nav w-12 h-12 rounded-2xl flex items-center justify-center transition-all">
                    <i class="fas fa-shopping-cart"></i>
                </button>
                <button onclick="switchTab('inventory')" id="nav-inventory" class="nav-btn w-12 h-12 rounded-2xl flex items-center justify-center text-slate-500 hover:bg-white transition-all">
                    <i class="fas fa-boxes"></i>
                </button>
            </div>
            <button onclick="fetchData()" class="w-12 h-12 rounded-2xl flex items-center justify-center text-slate-400 hover:text-blue-500 transition-all">
                <i class="fas fa-sync-alt" id="sync-icon"></i>
            </button>
        </nav>

        <main class="flex-1 space-y-6">
            
            <div id="view-pos" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div class="flex justify-between items-center">
                        <h1 class="text-2xl font-bold text-slate-800">Quick Sale</h1>
                        <input type="text" placeholder="Search products..." class="px-4 py-2 rounded-xl glass-card border-none focus:ring-2 ring-blue-500 w-64 outline-none">
                    </div>
                    
                    <div id="product-list" class="grid grid-cols-2 md:grid-cols-3 gap-4 custom-scroll overflow-y-auto h-[70vh] pr-2">
                        </div>
                </div>

                <div class="lg:col-span-1">
                    <div class="glass-card rounded-3xl p-6 h-full flex flex-col">
                        <h2 class="text-xl font-bold text-slate-800 mb-6">Current Order</h2>
                        
                        <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 mb-6 pr-2 custom-scroll">
                            <p class="text-slate-400 text-center py-10">Cart is empty</p>
                        </div>

                        <div class="border-t border-slate-200 pt-6 space-y-3">
                            <div class="flex justify-between text-slate-500">
                                <span>Subtotal</span>
                                <span id="subtotal">$0.00</span>
                            </div>
                            <div class="flex justify-between text-xl font-bold text-slate-800 pt-2">
                                <span>Total</span>
                                <span id="total">$0.00</span>
                            </div>
                            <button onclick="processSale()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold transition-all mt-4 transform active:scale-95">
                                Complete Payment
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-inventory" class="hidden space-y-6">
                <div class="flex justify-between items-center">
                    <h1 class="text-2xl font-bold text-slate-800">Inventory Management</h1>
                </div>
                <div class="glass-card rounded-3xl overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 text-sm uppercase">
                                <th class="p-6">Product</th>
                                <th class="p-6">Category</th>
                                <th class="p-6">Price</th>
                                <th class="p-6">Stock Level</th>
                                <th class="p-6">Status</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table-body" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaJT9WaWQ7-BDK5vkjQwrcZ9W86RATTgFsgH7dsAfhAOqbpA878B22qCbQVhQu24gZjQvw9MwDedQt/pub?output=csv';
        let inventory = [];
        let cart = [];

        async function fetchData() {
            const syncIcon = document.getElementById('sync-icon');
            syncIcon.classList.add('fa-spin');
            
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    dynamicTyping: true,
                    complete: (results) => {
                        // Adjust mapping based on typical CSV headers
                        inventory = results.data.map((item, index) => ({
                            id: index,
                            name: item.Name || item.product || 'Unknown Product',
                            price: parseFloat(item.Price || item.price || 0),
                            stock: parseInt(item.Stock || item.quantity || 0),
                            category: item.Category || item.category || 'General',
                            image: `https://source.unsplash.com/featured/?${item.Name},product`
                        })).filter(item => item.name !== 'Unknown Product');
                        
                        renderProducts();
                        renderInventory();
                        syncIcon.classList.remove('fa-spin');
                    }
                });
            } catch (error) {
                console.error("Error fetching data:", error);
                alert("Failed to load inventory. Check console.");
            }
        }

        function renderProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = inventory.map(item => `
                <div onclick="addToCart(${item.id})" class="glass-card p-4 rounded-3xl cursor-pointer hover:shadow-xl transition-all group">
                    <div class="h-32 bg-slate-100 rounded-2xl mb-4 overflow-hidden">
                        <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform">
                    </div>
                    <h3 class="font-bold text-slate-800 truncate">${item.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-blue-600 font-bold">$${item.price.toFixed(2)}</span>
                        <span class="text-xs text-slate-400">Stock: ${item.stock}</span>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = inventory.find(i => i.id === id);
            if (product.stock <= 0) return alert("Out of stock!");

            const existing = cart.find(c => c.id === id);
            if (existing) {
                if (existing.qty < product.stock) existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-slate-400 text-center py-10">Cart is empty</p>`;
                updateTotals(0);
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="flex items-center gap-4 bg-white/50 p-3 rounded-2xl">
                    <div class="flex-1">
                        <h4 class="font-medium text-slate-800 text-sm">${item.name}</h4>
                        <p class="text-xs text-slate-500">$${item.price.toFixed(2)} x ${item.qty}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="updateQty(${item.id}, -1)" class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center">-</button>
                        <span class="w-4 text-center font-bold">${item.qty}</span>
                        <button onclick="updateQty(${item.id}, 1)" class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center">+</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            updateTotals(total);
        }

        function updateQty(id, delta) {
            const item = cart.find(c => c.id === id);
            const product = inventory.find(i => i.id === id);
            
            if (item) {
                item.qty += delta;
                if (item.qty > product.stock) item.qty = product.stock;
                if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
            }
            renderCart();
        }

        function updateTotals(total) {
            document.getElementById('subtotal').innerText = `$${total.toFixed(2)}`;
            document.getElementById('total').innerText = `$${total.toFixed(2)}`;
        }

        function processSale() {
            if (cart.length === 0) return;
            
            // Deduct from inventory
            cart.forEach(cartItem => {
                const invItem = inventory.find(i => i.id === cartItem.id);
                if (invItem) invItem.stock -= cartItem.qty;
            });

            alert("Sale Successful! 2026 Receipt Generated.");
            cart = [];
            renderCart();
            renderProducts();
            renderInventory();
        }

        function renderInventory() {
            const tbody = document.getElementById('inventory-table-body');
            tbody.innerHTML = inventory.map(item => `
                <tr class="hover:bg-white/40 transition-colors">
                    <td class="p-6 font-medium text-slate-800">${item.name}</td>
                    <td class="p-6 text-slate-500 text-sm">${item.category}</td>
                    <td class="p-6 font-bold text-slate-700">$${item.price.toFixed(2)}</td>
                    <td class="p-6">
                        <div class="w-32 bg-slate-200 rounded-full h-2 mt-1">
                            <div class="bg-blue-500 h-2 rounded-full" style="width: ${Math.min(item.stock, 100)}%"></div>
                        </div>
                        <span class="text-xs text-slate-400 mt-1">${item.stock} units remaining</span>
                    </td>
                    <td class="p-6">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${item.stock > 10 ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                            ${item.stock > 10 ? 'Healthy' : 'Low Stock'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function switchTab(tab) {
            const views = ['pos', 'inventory'];
            views.forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`nav-${v}`).classList.remove('active-nav');
                document.getElementById(`nav-${v}`).classList.add('text-slate-500');
            });

            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('active-nav');
            document.getElementById(`nav-${tab}`).classList.remove('text-slate-500');
        }

        // Initialize
        fetchData();
    </script>
</body>
</html>
